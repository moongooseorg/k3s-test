name: Build and Push Container

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.vars.outputs.image_name }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set vars
        id: vars
        run: |
          set -a && source k8s/config.env && set +a
          echo "image_name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Substitute Dockerfile
        run: |
          set -a && source k8s/config.env && set +a
          envsubst < Dockerfile > Dockerfile.tmp && mv Dockerfile.tmp Dockerfile

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ghcr.io/${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.short_sha }}

      - name: Delete old container versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 2
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to k3s
    runs-on: self-hosted
    needs: build
    environment: production
    env:
      IMAGE_NAME: ${{ needs.build.outputs.image_name }}
      SHORT_SHA: ${{ needs.build.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Substitute manifests
        run: |
          set -a && source k8s/config.env && set +a
          for f in k8s/*.yaml; do
            envsubst < "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - name: Apply manifests
        run: kubectl apply -f k8s/
